name: 每日情书

on:
  schedule:
    # 每天 13:00 UTC = 8:00 AM EST（冬令时）/ 9:00 AM EDT（夏令时，3月后）
    - cron: "0 13 * * *"
  workflow_dispatch:  # 允许在 GitHub 网页上手动触发（测试用）

jobs:
  send-love-letter:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安装依赖
        run: pip install requests anthropic

      - name: 发送每日情书
        env:
          QWEATHER_KEY: ${{ secrets.QWEATHER_KEY }}
          CLAUDE_KEY: ${{ secrets.CLAUDE_KEY }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
        run: python send_message.py
